<label for="value">enter your value</label>
<input id="txt" type="text">
<button id="btn">add</button>
<ul id="list"></ul>

<script>
    const newtext = document.getElementById("txt");
    const adding = document.getElementById("btn");
    const list = document.getElementById("list");

    adding.addEventListener("click", () => {

        const value = newtext.value;

        if (value.trim() === "") return;

        const li = document.createElement("li");
        li.textContent = value;

        const debtn = document.createElement("button");
        debtn.textContent = " delete";

        debtn.addEventListener("click", () => {
            li.remove();   
        });

        li.appendChild(debtn);  
        list.appendChild(li);   

        newtext.value = "";
    });
</script>


<form id="myForm">
    <label>Username:</label>
    <input type="text" id="username">
    <button type="submit">Submit</button>
    <p id="message"></p>
</form>

<script>
    const form = document.getElementById("myForm");
    const username = document.getElementById("username");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(e) {

        e.preventDefault(); 

        if (username.value.trim() === "") {
            message.textContent = "Username cannot be empty";
            message.style.color = "red";
        } else {
            message.textContent = "Form submitted successfully!";
            message.style.color = "green";
        }

    });
</script>
